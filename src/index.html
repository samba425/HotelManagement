<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Restaurant Analytics — Enterprise Dashboard</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    body { margin: 0; background: #070d1a; overflow: hidden; }
    .splash {
      position: fixed; inset: 0; z-index: 9999;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      background: #070d1a;
      transition: opacity 0.5s ease, visibility 0.5s ease;
    }
    .splash.hide { opacity: 0; visibility: hidden; pointer-events: none; }
    .splash-logo {
      width: 64px; height: 64px; border-radius: 18px;
      background: linear-gradient(135deg, #818cf8 0%, #06b6d4 100%);
      display: flex; align-items: center; justify-content: center;
      animation: splash-pulse 1.5s ease-in-out infinite;
      box-shadow: 0 0 60px rgba(129,140,248,0.3);
    }
    .splash-logo svg { width: 32px; height: 32px; fill: none; stroke: white; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    .splash-text {
      margin-top: 20px; font-family: 'Inter', sans-serif; font-size: 18px;
      font-weight: 700; color: #e8edf5; letter-spacing: -0.02em;
    }
    .splash-sub {
      margin-top: 6px; font-family: 'Inter', sans-serif; font-size: 12px;
      color: #5e6b82; letter-spacing: 0.05em; text-transform: uppercase;
    }
    .splash-bar-wrap {
      margin-top: 28px; width: 180px; height: 3px; border-radius: 2px;
      background: rgba(255,255,255,0.06); overflow: hidden;
    }
    .splash-bar {
      height: 100%; width: 0; border-radius: 2px;
      background: linear-gradient(90deg, #818cf8, #06b6d4);
      animation: splash-load 1.8s ease-out forwards;
    }
    @keyframes splash-pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.06); }
    }
    @keyframes splash-load {
      0% { width: 0; }
      60% { width: 70%; }
      100% { width: 100%; }
    }
  </style>
</head>
<body>
  <div class="splash" id="splash">
    <div class="splash-logo">
      <svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
    </div>
    <div class="splash-text">Restaurant Analytics</div>
    <div class="splash-sub">Loading enterprise platform</div>
    <div class="splash-bar-wrap"><div class="splash-bar"></div></div>
  </div>
  <app-root></app-root>
  <script>
    window.addEventListener('load', function() {
      setTimeout(function() {
        var s = document.getElementById('splash');
        if (s) { s.classList.add('hide'); setTimeout(function() { s.remove(); }, 600); }
      }, 1600);
    });
  </script>
</body>
</html>
